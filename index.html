<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Irrigation Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#2E7D32;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.dashboard{
    background:#fff;
    width:380px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#2E7D32;
    margin-bottom:20px;
}

.card{
    background:#F1F8E9;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.card h3{
    margin-bottom:10px;
}

.progress{
    width:100%;
    height:25px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    width:65%;
    height:100%;
    background:#4CAF50;
    text-align:center;
    color:#fff;
    line-height:25px;
    font-weight:bold;
    transition:0.5s;
}

.status{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    color:white;
}

#pumpBtn{
    background:#2196F3;
}

#refreshBtn{
    background:#4CAF50;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="dashboard">

    <h2>🌱 Smart Irrigation Dashboard</h2>

    <div class="card">
        <h3>Soil Moisture</h3>

        <div class="progress">
            <div class="progress-bar" id="moistureBar">
                65%
            </div>
        </div>
    </div>

    <div class="status">
        Soil Moisture:
        <span id="moistureValue">65%</span>
    </div>

    <div class="status">
        Water Pump:
        <span id="pumpStatus" style="color:red;">OFF</span>
    </div>

    <button id="pumpBtn" onclick="togglePump()">
        Turn Pump ON
    </button>

    <button id="refreshBtn" onclick="updateMoisture()">
        Refresh Sensor
    </button>

</div>

<script>

let pump = false;

function togglePump(){

    pump = !pump;

    let status = document.getElementById("pumpStatus");
    let button = document.getElementById("pumpBtn");

    if(pump){
        status.innerHTML = "ON";
        status.style.color = "green";
        button.innerHTML = "Turn Pump OFF";
    }else{
        status.innerHTML = "OFF";
        status.style.color = "red";
        button.innerHTML = "Turn Pump ON";
    }
}

function updateMoisture(){

    let moisture = Math.floor(Math.random()*101);

    let bar = document.getElementById("moistureBar");

    bar.style.width = moisture + "%";
    bar.innerHTML = moisture + "%";

    document.getElementById("moistureValue").innerHTML = moisture + "%";

    // Color indication
    if(moisture < 30){
        bar.style.background = "#f44336"; // Dry
    }
    else if(moisture < 60){
        bar.style.background = "#ff9800"; // Moderate
    }
    else{
        bar.style.background = "#4CAF50"; // Wet
    }

    // Automatic Pump Control
    if(moisture < 30){
        pump = true;
        document.getElementById("pumpStatus").innerHTML = "ON";
        document.getElementById("pumpStatus").style.color = "green";
        document.getElementById("pumpBtn").innerHTML = "Turn Pump OFF";
    }else{
        pump = false;
        document.getElementById("pumpStatus").innerHTML = "OFF";
        document.getElementById("pumpStatus").style.color = "red";
        document.getElementById("pumpBtn").innerHTML = "Turn Pump ON";
    }
}

</script>

</body>
</html>
